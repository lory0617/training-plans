<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lory Fitness — 教練後台</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;600;700&family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0a0a0a;
      --surface: #1a1a1a;
      --surface2: #252525;
      --gold: #f5a623;
      --gold-hover: #ffc857;
      --text: #ffffff;
      --text-muted: #999999;
      --danger: #e74c3c;
      --success: #2ecc71;
      --border: #333333;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Noto Sans TC', sans-serif;
      background: linear-gradient(135deg, #0a0a0a 0%, #1a1a2e 50%, #0a0a0a 100%);
      color: var(--text); min-height: 100vh;
    }
    h1, h2, h3 { font-family: 'Oswald', sans-serif; letter-spacing: 1px; }

    /* Login */
    #loginScreen { display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 2rem; }
    .login-box { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 3rem; width: 100%; max-width: 400px; text-align: center; }
    .login-box h1 { font-size: 2rem; color: var(--gold); margin-bottom: 0.5rem; }
    .login-box p { color: var(--text-muted); margin-bottom: 2rem; }

    /* Form */
    .form-group { margin-bottom: 1rem; text-align: left; }
    .form-group label { display: block; font-size: 0.85rem; color: var(--text-muted); margin-bottom: 0.3rem; }
    .form-group input, .form-group select, .form-group textarea {
      width: 100%; padding: 0.75rem 1rem; background: var(--surface2); border: 1px solid var(--border);
      border-radius: 8px; color: var(--text); font-size: 1rem; font-family: 'Noto Sans TC', sans-serif;
      outline: none; transition: border-color 0.2s;
    }
    .form-group input:focus, .form-group select:focus, .form-group textarea:focus { border-color: var(--gold); }
    .form-group textarea { resize: vertical; min-height: 80px; }

    /* Buttons */
    .btn { display: inline-block; padding: 0.75rem 1.5rem; border: none; border-radius: 8px; font-size: 1rem; font-family: 'Noto Sans TC', sans-serif; font-weight: 500; cursor: pointer; transition: all 0.2s; }
    .btn-gold { background: var(--gold); color: #000; }
    .btn-gold:hover { background: var(--gold-hover); }
    .btn-outline { background: transparent; border: 1px solid var(--border); color: var(--text); }
    .btn-outline:hover { border-color: var(--gold); color: var(--gold); }
    .btn-danger { background: var(--danger); color: #fff; }
    .btn-danger:hover { opacity: 0.8; }
    .btn-success { background: var(--success); color: #fff; }
    .btn-success:hover { opacity: 0.8; }
    .btn-sm { padding: 0.4rem 0.8rem; font-size: 0.85rem; }
    .btn-full { width: 100%; }
    .error-msg { color: var(--danger); font-size: 0.85rem; margin-top: 0.5rem; }

    /* Dashboard */
    #dashboard { display: none; }
    .topbar { display: flex; justify-content: space-between; align-items: center; padding: 1rem 2rem; background: var(--surface); border-bottom: 1px solid var(--border); }
    .topbar h2 { font-size: 1.4rem; color: var(--gold); }

    /* Tabs */
    .tab-bar { display: flex; gap: 0; background: var(--surface); border-bottom: 1px solid var(--border); padding: 0 2rem; }
    .tab-btn { padding: 0.8rem 1.5rem; background: none; border: none; border-bottom: 3px solid transparent; color: var(--text-muted); font-size: 0.95rem; font-family: 'Noto Sans TC', sans-serif; cursor: pointer; transition: all 0.2s; }
    .tab-btn:hover { color: var(--text); }
    .tab-btn.active { color: var(--gold); border-bottom-color: var(--gold); font-weight: 500; }

    .main-content { max-width: 1100px; margin: 0 auto; padding: 2rem; }
    .section-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem; flex-wrap: wrap; gap: 0.5rem; }
    .section-header h2 { font-size: 1.6rem; }
    .view { display: none; }
    .view.active { display: block; }
    .empty-state { text-align: center; padding: 3rem; color: var(--text-muted); }
    .back-link { color: var(--gold); cursor: pointer; font-size: 0.9rem; margin-bottom: 1.5rem; display: inline-block; }
    .back-link:hover { text-decoration: underline; }

    /* Student Cards */
    .student-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 1rem; }
    .student-card { background: linear-gradient(145deg, rgba(255,255,255,0.05), rgba(255,255,255,0.01)); border: none; border-radius: 12px; padding: 1.5rem; cursor: pointer; transition: all 0.2s; }
    .student-card:hover { background: linear-gradient(145deg, rgba(245,166,35,0.1), rgba(255,255,255,0.03)); transform: translateY(-2px); }
    .student-card h3 { font-size: 1.2rem; margin-bottom: 0.5rem; }
    .student-card .meta { color: var(--text-muted); font-size: 0.85rem; line-height: 1.6; }
    .student-card .sessions { margin-top: 0.75rem; padding-top: 0.75rem; border-top: 1px solid var(--border); display: flex; justify-content: space-between; font-size: 0.85rem; }
    .sessions .remaining { color: var(--gold); font-weight: 700; }

    /* Student Detail */
    .detail-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 2rem; }
    .detail-header h2 { font-size: 1.8rem; }
    .detail-actions { display: flex; gap: 0.5rem; flex-wrap: wrap; }
    .detail-section { background: linear-gradient(145deg, rgba(255,255,255,0.04), rgba(255,255,255,0.01)); border-radius: 16px; padding: 1.5rem 2rem; margin-bottom: 1.5rem; }
    .detail-section-title { font-family: 'Oswald', sans-serif; font-size: 1rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 2px; margin-bottom: 1rem; }
    .info-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 1.2rem; }
    .info-item .label { font-size: 0.75rem; color: var(--text-muted); margin-bottom: 0.2rem; }
    .info-item .value { font-size: 1.1rem; font-weight: 500; }
    .info-item .value.gold { color: var(--gold); }
    .session-highlight { display: flex; align-items: center; gap: 2rem; }
    .session-number { font-family: 'Oswald', sans-serif; font-size: 3rem; font-weight: 700; color: var(--gold); line-height: 1; }
    .session-label { font-size: 0.9rem; color: var(--text-muted); }
    .session-sub { font-size: 0.85rem; color: var(--text-muted); margin-top: 0.3rem; }

    /* Quick Actions in Detail */
    .quick-actions { display: flex; gap: 0.75rem; margin-bottom: 2rem; flex-wrap: wrap; }

    /* Weight Chart */
    .chart-container { margin-bottom: 2rem; }
    .chart-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem; }
    .chart-header h3 { font-family: 'Oswald', sans-serif; font-size: 1.3rem; }
    .weight-change { font-size: 0.9rem; font-weight: 600; }
    .weight-change.down { color: var(--success); }
    .weight-change.up { color: var(--danger); }
    #weightChart { width: 100%; height: 200px; border-radius: 12px; background: linear-gradient(145deg, rgba(255,255,255,0.04), rgba(255,255,255,0.01)); }

    /* Records */
    .records-header { display: flex; justify-content: space-between; align-items: center; margin: 2rem 0 1rem; }
    .record-card { background: linear-gradient(145deg, rgba(255,255,255,0.04), rgba(255,255,255,0.01)); border: none; border-radius: 8px; padding: 1.2rem; margin-bottom: 0.75rem; }
    .record-card .record-date { color: var(--gold); font-weight: 600; font-family: 'Oswald', sans-serif; font-size: 1rem; margin-bottom: 0.5rem; }
    .record-card .record-stats { display: flex; gap: 1.5rem; font-size: 0.85rem; color: var(--text-muted); margin-bottom: 0.5rem; }
    .record-card .record-notes { font-size: 0.9rem; line-height: 1.5; color: var(--text); }

    /* Schedule */
    .todo-section { margin-bottom: 2.5rem; }
    .todo-card { background: linear-gradient(145deg, rgba(245,166,35,0.08), rgba(255,255,255,0.02)); border-left: 3px solid var(--gold); border-radius: 8px; padding: 1.2rem; margin-bottom: 0.75rem; display: flex; justify-content: space-between; align-items: center; }
    .todo-info h3 { font-size: 1rem; margin-bottom: 0.25rem; }
    .todo-info .todo-time { color: var(--text-muted); font-size: 0.85rem; }
    .todo-actions { display: flex; gap: 0.5rem; }
    .booking-card { background: linear-gradient(145deg, rgba(255,255,255,0.04), rgba(255,255,255,0.01)); border-radius: 8px; padding: 1rem 1.2rem; margin-bottom: 0.5rem; display: flex; justify-content: space-between; align-items: center; }
    .booking-info { font-size: 0.9rem; }
    .booking-info strong { color: var(--text); }
    .booking-info .booking-time { color: var(--text-muted); font-size: 0.85rem; }
    .booking-status { font-size: 0.8rem; padding: 0.2rem 0.6rem; border-radius: 4px; }
    .booking-status.confirmed { background: rgba(46,204,113,0.2); color: var(--success); }
    .booking-status.cancelled { background: rgba(231,76,60,0.2); color: var(--danger); }

    /* Finance */
    .finance-cards { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 1rem; margin-bottom: 2rem; }
    .finance-card { background: linear-gradient(145deg, rgba(255,255,255,0.04), rgba(255,255,255,0.01)); border-radius: 12px; padding: 1.5rem; }
    .finance-card .fc-label { font-size: 0.8rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 0.5rem; }
    .finance-card .fc-value { font-family: 'Oswald', sans-serif; font-size: 2rem; font-weight: 700; }
    .finance-card .fc-value.gold { color: var(--gold); }
    .finance-card .fc-value.green { color: var(--success); }
    .finance-card .fc-sub { font-size: 0.8rem; color: var(--text-muted); margin-top: 0.3rem; }
    .purchase-card { background: linear-gradient(145deg, rgba(255,255,255,0.04), rgba(255,255,255,0.01)); border-radius: 8px; padding: 1.2rem; margin-bottom: 0.75rem; display: flex; justify-content: space-between; align-items: center; }
    .purchase-info .purchase-student { font-weight: 500; margin-bottom: 0.2rem; }
    .purchase-info .purchase-detail { font-size: 0.85rem; color: var(--text-muted); }
    .purchase-amount { font-family: 'Oswald', sans-serif; font-size: 1.3rem; color: var(--gold); font-weight: 600; }

    /* Modal */
    .modal-overlay { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.8); z-index: 100; align-items: center; justify-content: center; padding: 2rem; }
    .modal-overlay.show { display: flex; }
    .modal { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 2rem; width: 100%; max-width: 500px; max-height: 90vh; overflow-y: auto; }
    .modal h2 { font-size: 1.4rem; color: var(--gold); margin-bottom: 1.5rem; }
    .modal-actions { display: flex; gap: 0.75rem; margin-top: 1.5rem; justify-content: flex-end; }

    /* Exercise Entry */
    .exercise-entry { margin-top: 1rem; }
    .exercise-entry-title { font-size: 0.85rem; color: var(--text-muted); margin-bottom: 0.5rem; }
    .exercise-row { display: flex; gap: 0.5rem; margin-bottom: 0.5rem; align-items: center; }
    .exercise-row input { flex: 1; padding: 0.5rem 0.75rem; background: var(--surface2); border: 1px solid var(--border); border-radius: 6px; color: var(--text); font-size: 0.9rem; font-family: 'Noto Sans TC', sans-serif; outline: none; }
    .exercise-row input:focus { border-color: var(--gold); }
    .exercise-row input.ex-name { flex: 2; }
    .exercise-row input.ex-weight { flex: 1; }
    .exercise-row input.ex-sets { flex: 0.8; }
    .exercise-row .ex-remove { background: none; border: none; color: var(--danger); cursor: pointer; font-size: 1.1rem; padding: 0.3rem; opacity: 0.6; }
    .exercise-row .ex-remove:hover { opacity: 1; }
    .exercise-add-btn { background: none; border: 1px dashed var(--border); border-radius: 6px; color: var(--text-muted); padding: 0.5rem; width: 100%; cursor: pointer; font-size: 0.85rem; font-family: 'Noto Sans TC', sans-serif; transition: all 0.2s; }
    .exercise-add-btn:hover { border-color: var(--gold); color: var(--gold); }
    .exercise-chips { display: flex; flex-wrap: wrap; gap: 0.4rem; margin-bottom: 0.6rem; }
    .exercise-chip { background: var(--surface2); border: 1px solid var(--border); border-radius: 16px; padding: 0.25rem 0.7rem; font-size: 0.8rem; color: var(--text-muted); cursor: pointer; transition: all 0.15s; font-family: 'Noto Sans TC', sans-serif; }
    .exercise-chip:hover { border-color: var(--gold); color: var(--gold); }

    /* Exercise Picker (folder style) */
    .exercise-picker { margin-bottom: 0.75rem; }
    .exercise-picker-toggle { background: none; border: 1px solid var(--border); border-radius: 8px; color: var(--gold); padding: 0.5rem 1rem; cursor: pointer; font-size: 0.85rem; font-family: 'Noto Sans TC', sans-serif; transition: all 0.2s; width: 100%; text-align: left; display: flex; justify-content: space-between; align-items: center; }
    .exercise-picker-toggle:hover { border-color: var(--gold); }
    .exercise-picker-toggle .arrow { transition: transform 0.2s; }
    .exercise-picker-toggle.open .arrow { transform: rotate(180deg); }
    .exercise-picker-body { display: none; margin-top: 0.5rem; background: var(--surface2); border-radius: 8px; padding: 0.75rem; }
    .exercise-picker-body.open { display: block; }
    .exercise-cat-tabs { display: flex; gap: 0.4rem; margin-bottom: 0.6rem; flex-wrap: wrap; }
    .exercise-cat-tab { background: none; border: 1px solid var(--border); border-radius: 6px; color: var(--text-muted); padding: 0.3rem 0.8rem; cursor: pointer; font-size: 0.8rem; font-family: 'Noto Sans TC', sans-serif; transition: all 0.15s; }
    .exercise-cat-tab:hover { border-color: var(--gold); color: var(--gold); }
    .exercise-cat-tab.active { background: var(--gold); color: #000; border-color: var(--gold); }
    .exercise-cat-items { display: flex; flex-wrap: wrap; gap: 0.4rem; }
    .exercise-cat-item { background: rgba(255,255,255,0.04); border: 1px solid var(--border); border-radius: 16px; padding: 0.3rem 0.8rem; font-size: 0.8rem; color: var(--text); cursor: pointer; font-family: 'Noto Sans TC', sans-serif; transition: all 0.15s; }
    .exercise-cat-item:hover { border-color: var(--gold); color: var(--gold); background: rgba(245,166,35,0.1); }
    .exercise-suggest { position: absolute; background: var(--surface); border: 1px solid var(--border); border-radius: 6px; max-height: 150px; overflow-y: auto; z-index: 10; width: 100%; }
    .exercise-suggest-item { padding: 0.4rem 0.75rem; cursor: pointer; font-size: 0.85rem; color: var(--text-muted); }
    .exercise-suggest-item:hover { background: var(--surface2); color: var(--gold); }

    /* Exercise Reference in Detail */
    .exercise-ref-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 0.5rem; }
    .exercise-ref-item { display: flex; justify-content: space-between; align-items: center; padding: 0.6rem 1rem; background: rgba(255,255,255,0.02); border-radius: 6px; }
    .exercise-ref-item .ex-ref-name { font-size: 0.9rem; color: var(--text); }
    .exercise-ref-item .ex-ref-weight { font-size: 0.9rem; color: var(--gold); font-weight: 600; font-family: 'Oswald', sans-serif; }

    /* Exercise in Record Card */
    .record-exercises { margin-top: 0.5rem; }
    .record-exercises .re-item { font-size: 0.85rem; color: var(--text-muted); padding: 0.15rem 0; }
    .record-exercises .re-item .re-weight { color: var(--gold); }
    .record-exercises .re-item .re-sets { color: var(--text-muted); margin-left: 0.3rem; }

    /* Toast */
    .toast {
      position: fixed; bottom: 2rem; left: 50%; transform: translateX(-50%) translateY(100px);
      background: var(--surface); border: 1px solid var(--gold); border-radius: 8px;
      padding: 0.8rem 1.5rem; color: var(--gold); font-weight: 500; font-size: 0.9rem;
      z-index: 200; opacity: 0; transition: all 0.3s ease;
    }
    .toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }

    /* Todo Badge */
    .tab-btn { position: relative; }
    .todo-badge {
      position: absolute; top: 6px; right: 4px;
      background: var(--danger); color: #fff; font-size: 0.65rem; font-weight: 700;
      width: 18px; height: 18px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
    }

    /* Danger zone */
    .danger-zone {
      margin-top: 3rem; padding-top: 1.5rem; border-top: 1px solid rgba(231,76,60,0.2);
    }
    .danger-zone-label { font-size: 0.8rem; color: var(--danger); margin-bottom: 0.5rem; text-transform: uppercase; letter-spacing: 1px; }

    /* Responsive */
    @media (max-width: 600px) {
      .topbar { padding: 1rem; }
      .tab-bar { padding: 0 1rem; overflow-x: auto; }
      .tab-btn { padding: 0.8rem 1rem; font-size: 0.85rem; white-space: nowrap; }
      .main-content { padding: 1rem; }
      .detail-header { flex-direction: column; gap: 1rem; }
      .info-grid { grid-template-columns: 1fr 1fr; }
      .student-grid { grid-template-columns: 1fr; }
      .finance-cards { grid-template-columns: 1fr 1fr; }
      .modal { margin: 1rem; }
      .todo-card { flex-direction: column; align-items: flex-start; gap: 0.75rem; }
      .purchase-card { flex-direction: column; align-items: flex-start; gap: 0.5rem; }
    }
  </style>
</head>
<body>

  <!-- Login -->
  <div id="loginScreen">
    <div class="login-box">
      <h1>LORY FITNESS</h1>
      <p>教練後台管理系統</p>
      <div class="form-group"><label>Email</label><input type="email" id="loginEmail" placeholder="請輸入 Email"></div>
      <div class="form-group"><label>密碼</label><input type="password" id="loginPassword" placeholder="請輸入密碼"></div>
      <div id="loginError" class="error-msg"></div>
      <button class="btn btn-gold btn-full" style="margin-top:1rem" onclick="handleLogin()">登入</button>
    </div>
  </div>

  <!-- Dashboard -->
  <div id="dashboard">
    <div class="topbar">
      <a href="index.html" style="text-decoration:none"><h2>LORY FITNESS</h2></a>
      <button class="btn btn-outline btn-sm" onclick="handleLogout()">登出</button>
    </div>
    <div class="tab-bar">
      <button class="tab-btn active" data-tab="students" onclick="switchTab('students', this)">學員列表</button>
      <button class="tab-btn" data-tab="schedule" onclick="switchTab('schedule', this)">行程表</button>
      <button class="tab-btn" data-tab="finance" onclick="switchTab('finance', this)">金流</button>
    </div>
    <div class="main-content">

      <!-- TAB: Students -->
      <div id="tabStudents" class="view active">
        <div id="viewList" class="view active">
          <div class="section-header">
            <h2>學員列表</h2>
            <button class="btn btn-gold" onclick="showAddStudent()">+ 新增學員</button>
          </div>
          <div id="studentGrid" class="student-grid"><div class="empty-state">載入中...</div></div>
        </div>
        <div id="viewDetail" class="view">
          <span class="back-link" onclick="showList()">← 返回學員列表</span>
          <div class="detail-header">
            <h2 id="detailName"></h2>
            <div class="detail-actions">
              <button class="btn btn-outline btn-sm" onclick="showEditStudent()">編輯資料</button>
            </div>
          </div>
          <div id="detailInfo"></div>

          <!-- Quick Actions -->
          <div class="quick-actions">
            <button class="btn btn-gold btn-sm" onclick="showBookingForStudent()">+ 預約上課</button>
            <button class="btn btn-outline btn-sm" onclick="showPurchaseForStudent()">+ 新增購課</button>
            <button class="btn btn-outline btn-sm" onclick="showQuickWeight()">+ 記錄體重</button>
          </div>

          <!-- Weight Chart -->
          <div id="weightChartSection" class="chart-container" style="display:none">
            <div class="chart-header">
              <h3>體重變化</h3>
              <span id="weightChangeLabel" class="weight-change"></span>
            </div>
            <canvas id="weightChart"></canvas>
          </div>

          <!-- Exercise Reference -->
          <div id="exerciseRefSection" class="detail-section" style="display:none">
            <div class="detail-section-title">訓練重量參考（最近一次）</div>
            <div id="exerciseRefGrid" class="exercise-ref-grid"></div>
          </div>

          <!-- Records -->
          <div class="records-header">
            <h3 style="font-family:'Oswald',sans-serif; font-size:1.3rem;">上課紀錄</h3>
            <button class="btn btn-gold btn-sm" onclick="showAddRecord()">+ 補登上課</button>
          </div>
          <div id="recordsList"></div>

          <!-- Danger Zone -->
          <div class="danger-zone">
            <div class="danger-zone-label">危險操作</div>
            <button class="btn btn-danger btn-sm" onclick="deleteStudent()">刪除此學員</button>
          </div>
        </div>
      </div>

      <!-- TAB: Schedule -->
      <div id="tabSchedule" class="view">
        <div class="todo-section">
          <div class="section-header"><h2>待確認完課</h2></div>
          <div id="todoList"><div class="empty-state">沒有待確認的課程</div></div>
        </div>
        <div class="section-header">
          <h2>近期預約</h2>
          <button class="btn btn-gold" onclick="showAddBooking()">+ 新增預約</button>
        </div>
        <div id="upcomingBookings"><div class="empty-state">載入中...</div></div>
        <div style="margin-top:2rem">
          <h3 style="font-family:'Oswald',sans-serif; font-size:1.2rem; color:var(--text-muted); margin-bottom:1rem;">歷史紀錄</h3>
          <div id="pastBookings"></div>
        </div>
      </div>

      <!-- TAB: Finance -->
      <div id="tabFinance" class="view">
        <div class="section-header">
          <h2>金流總覽</h2>
          <button class="btn btn-gold" onclick="showAddPurchase()">+ 新增購課</button>
        </div>
        <div id="financeCards" class="finance-cards"></div>
        <h3 style="font-family:'Oswald',sans-serif; font-size:1.2rem; margin-bottom:1rem;">購課紀錄</h3>
        <div id="purchaseList"><div class="empty-state">載入中...</div></div>
      </div>

    </div>
  </div>

  <!-- Modals -->

  <!-- Student Modal -->
  <div id="studentModal" class="modal-overlay"><div class="modal">
    <h2 id="studentModalTitle">新增學員</h2>
    <div class="form-group"><label>姓名 *</label><input type="text" id="sName" placeholder="學員姓名"></div>
    <div class="form-group"><label>性別</label><select id="sGender"><option value="male">男性</option><option value="female">女性</option></select></div>
    <div class="form-group"><label>身高 (cm)</label><input type="number" id="sHeight" placeholder="170"></div>
    <div class="form-group"><label>體重 (kg)</label><input type="number" id="sWeight" placeholder="70"></div>
    <div class="form-group"><label>年齡</label><input type="number" id="sAge" placeholder="25"></div>
    <div class="form-group"><label>聯絡方式（LINE / 電話）</label><input type="text" id="sContact" placeholder="LINE ID 或電話"></div>
    <div class="form-group"><label>開始上課日期</label><input type="date" id="sStartDate"></div>
    <div class="modal-actions">
      <button class="btn btn-outline" onclick="closeModal('studentModal')">取消</button>
      <button class="btn btn-gold" onclick="saveStudent()">儲存</button>
    </div>
  </div></div>

  <!-- Record Modal (manual add = confirmed booking) -->
  <div id="recordModal" class="modal-overlay"><div class="modal">
    <h2>補登上課</h2>
    <div class="form-group"><label>上課日期 *</label><input type="date" id="rDate"></div>
    <div class="form-group"><label>時間</label><input type="time" id="rTime" value="10:00"></div>
    <div class="form-group"><label>體重 (kg)</label><input type="number" step="0.1" id="rWeight" placeholder="選填"></div>
    <div class="form-group"><label>體脂率 (%)</label><input type="number" step="0.1" id="rBodyFat" placeholder="選填"></div>
    <div class="form-group"><label>課堂筆記</label><textarea id="rNotes" placeholder="記錄學員狀況、聊天內容..."></textarea></div>
    <div class="exercise-entry">
      <div class="exercise-entry-title">訓練項目</div>
      <div id="rExercisePicker" class="exercise-picker"></div>
      <div id="rExercises"></div>
      <button type="button" class="exercise-add-btn" onclick="addExerciseRow('rExercises')">+ 新增動作</button>
    </div>
    <div class="modal-actions">
      <button class="btn btn-outline" onclick="closeModal('recordModal')">取消</button>
      <button class="btn btn-gold" onclick="saveRecord()">儲存</button>
    </div>
  </div></div>

  <!-- Booking Modal -->
  <div id="bookingModal" class="modal-overlay"><div class="modal">
    <h2>新增預約</h2>
    <div class="form-group"><label>學員 *</label><select id="bStudent"></select></div>
    <div class="form-group"><label>日期 *</label><input type="date" id="bDate"></div>
    <div class="form-group"><label>時間 *</label><input type="time" id="bTime" value="10:00"></div>
    <div class="modal-actions">
      <button class="btn btn-outline" onclick="closeModal('bookingModal')">取消</button>
      <button class="btn btn-gold" onclick="saveBooking()">儲存</button>
    </div>
  </div></div>

  <!-- Purchase Modal -->
  <div id="purchaseModal" class="modal-overlay"><div class="modal">
    <h2>新增購課紀錄</h2>
    <div class="form-group"><label>學員 *</label><select id="pStudent"></select></div>
    <div class="form-group"><label>購課日期</label><input type="date" id="pDate"></div>
    <div class="form-group"><label>購買堂數 *</label><input type="number" id="pSessions" placeholder="10"></div>
    <div class="form-group"><label>付款金額 (元) *</label><input type="number" id="pAmount" placeholder="12000"></div>
    <div class="modal-actions">
      <button class="btn btn-outline" onclick="closeModal('purchaseModal')">取消</button>
      <button class="btn btn-gold" onclick="savePurchase()">儲存</button>
    </div>
  </div></div>

  <!-- Todo Confirm Modal -->
  <div id="todoConfirmModal" class="modal-overlay"><div class="modal">
    <h2>確認完課</h2>
    <p style="color:var(--text-muted); margin-bottom:1rem;" id="todoConfirmText"></p>
    <div class="form-group"><label>體重 (kg)</label><input type="number" step="0.1" id="tcWeight" placeholder="選填"></div>
    <div class="form-group"><label>體脂率 (%)</label><input type="number" step="0.1" id="tcBodyFat" placeholder="選填"></div>
    <div class="form-group"><label>課堂筆記</label><textarea id="tcNotes" placeholder="記錄學員狀況、聊天內容..."></textarea></div>
    <div class="exercise-entry">
      <div class="exercise-entry-title">訓練項目</div>
      <div id="tcExercisePicker" class="exercise-picker"></div>
      <div id="tcExercises"></div>
      <button type="button" class="exercise-add-btn" onclick="addExerciseRow('tcExercises')">+ 新增動作</button>
    </div>
    <div class="modal-actions">
      <button class="btn btn-outline" onclick="closeModal('todoConfirmModal')">取消</button>
      <button class="btn btn-gold" onclick="confirmTodo()">確認完課</button>
    </div>
  </div></div>

  <!-- Quick Weight Modal -->
  <div id="weightModal" class="modal-overlay"><div class="modal">
    <h2>記錄體重</h2>
    <div class="form-group"><label>日期</label><input type="date" id="qwDate"></div>
    <div class="form-group"><label>體重 (kg) *</label><input type="number" step="0.1" id="qwWeight" placeholder="70.5"></div>
    <div class="form-group"><label>體脂率 (%)</label><input type="number" step="0.1" id="qwBodyFat" placeholder="選填"></div>
    <div class="modal-actions">
      <button class="btn btn-outline" onclick="closeModal('weightModal')">取消</button>
      <button class="btn btn-gold" onclick="saveQuickWeight()">儲存</button>
    </div>
  </div></div>

  <!-- Toast -->
  <div id="toast" class="toast"></div>

  <!-- Firebase SDK -->
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
  <script src="firebase-config.js"></script>

  <script>
    // ===== State =====
    let currentStudentId = null;
    let editingStudentId = null;
    let confirmingBooking = null;
    let studentsCache = [];
    let saving = false;

    // ===== Helpers =====
    function closeModal(id) { document.getElementById(id).classList.remove('show'); }
    function openModal(id) { document.getElementById(id).classList.add('show'); }
    function formatMoney(n) { return 'NT$ ' + (n || 0).toLocaleString(); }
    function todayStr() { return new Date().toISOString().split('T')[0]; }

    function showToast(msg) {
      const t = document.getElementById('toast');
      t.textContent = msg;
      t.classList.add('show');
      setTimeout(() => t.classList.remove('show'), 2500);
    }

    async function updateTodoBadge() {
      try {
        const nowStr = new Date().toISOString();
        const snap = await db.collection('bookings')
          .where('status', 'in', ['pending', 'upcoming']).get();
        let count = 0;
        snap.forEach(doc => {
          const b = doc.data();
          if (b.status === 'pending' || (b.status === 'upcoming' && b.dateTime <= nowStr)) count++;
        });
        const tabBtn = document.querySelector('.tab-btn[data-tab="schedule"]');
        const existing = tabBtn.querySelector('.todo-badge');
        if (existing) existing.remove();
        if (count > 0) {
          const badge = document.createElement('span');
          badge.className = 'todo-badge';
          badge.textContent = count;
          tabBtn.appendChild(badge);
        }
      } catch (err) { console.error(err); }
    }

    // ===== Auth =====
    auth.onAuthStateChanged(user => {
      if (user) {
        document.getElementById('loginScreen').style.display = 'none';
        document.getElementById('dashboard').style.display = 'block';
        loadStudentsCache().then(() => loadStudents());
        updateTodoBadge();
        loadExerciseHistory();
        loadCustomExercises();
      } else {
        document.getElementById('loginScreen').style.display = 'flex';
        document.getElementById('dashboard').style.display = 'none';
      }
    });

    function handleLogin() {
      const email = document.getElementById('loginEmail').value.trim();
      const password = document.getElementById('loginPassword').value;
      const errorEl = document.getElementById('loginError');
      errorEl.textContent = '';
      if (!email || !password) { errorEl.textContent = '請輸入 Email 和密碼'; return; }
      auth.signInWithEmailAndPassword(email, password)
        .catch(() => { errorEl.textContent = '登入失敗：帳號或密碼錯誤'; });
    }
    document.getElementById('loginPassword').addEventListener('keydown', e => { if (e.key === 'Enter') handleLogin(); });
    function handleLogout() { auth.signOut(); }

    // ===== Tabs =====
    function switchTab(tab, btn) {
      document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
      document.querySelectorAll('.main-content > .view').forEach(v => v.classList.remove('active'));
      btn.classList.add('active');
      if (tab === 'students') { document.getElementById('tabStudents').classList.add('active'); showList(); }
      else if (tab === 'schedule') { document.getElementById('tabSchedule').classList.add('active'); loadSchedule(); }
      else if (tab === 'finance') { document.getElementById('tabFinance').classList.add('active'); loadFinance(); }
    }

    // ===== Navigation =====
    function showList() {
      document.getElementById('viewList').classList.add('active');
      document.getElementById('viewDetail').classList.remove('active');
      currentStudentId = null;
      loadStudents();
    }
    function showDetail(id) {
      currentStudentId = id;
      document.getElementById('viewList').classList.remove('active');
      document.getElementById('viewDetail').classList.add('active');
      loadStudentDetail(id);
    }

    // ===== Students Cache =====
    async function loadStudentsCache() {
      try {
        const snap = await db.collection('students').orderBy('createdAt', 'desc').get();
        studentsCache = [];
        snap.forEach(doc => studentsCache.push({ id: doc.id, ...doc.data() }));
      } catch (err) { console.error(err); }
    }
    function populateStudentSelect(selectId, preselectedId) {
      const sel = document.getElementById(selectId);
      sel.innerHTML = '<option value="" disabled selected>選擇學員</option>';
      studentsCache.forEach(s => {
        const opt = document.createElement('option');
        opt.value = s.id; opt.textContent = s.name;
        if (preselectedId === s.id) opt.selected = true;
        sel.appendChild(opt);
      });
    }

    // ===== Students =====
    async function loadStudents() {
      const grid = document.getElementById('studentGrid');
      grid.innerHTML = '<div class="empty-state">載入中...</div>';
      try {
        const snapshot = await db.collection('students').orderBy('createdAt', 'desc').get();
        if (snapshot.empty) { grid.innerHTML = '<div class="empty-state">尚無學員，點擊右上角新增</div>'; return; }
        grid.innerHTML = '';
        snapshot.forEach(doc => {
          const s = doc.data();
          const remaining = (s.totalSessions || 0) - (s.usedSessions || 0);
          const card = document.createElement('div');
          card.className = 'student-card';
          card.onclick = () => showDetail(doc.id);
          card.innerHTML = `<h3>${s.name}</h3>
            <div class="meta">${s.gender === 'female' ? '女性' : '男性'}${s.age ? ` · ${s.age} 歲` : ''}${s.contact ? `<br>${s.contact}` : ''}</div>
            <div class="sessions"><span>已上 ${s.usedSessions || 0} / ${s.totalSessions || 0} 堂</span><span class="remaining">剩餘 ${remaining} 堂</span></div>`;
          grid.appendChild(card);
        });
      } catch (err) { grid.innerHTML = '<div class="empty-state">載入失敗</div>'; }
    }

    async function loadStudentDetail(id) {
      try {
        const doc = await db.collection('students').doc(id).get();
        if (!doc.exists) { showList(); return; }
        const s = doc.data();
        const remaining = (s.totalSessions || 0) - (s.usedSessions || 0);
        document.getElementById('detailName').textContent = s.name;
        document.getElementById('detailInfo').innerHTML = `
          <div class="detail-section">
            <div class="detail-section-title">個人資料</div>
            <div class="info-grid">
              <div class="info-item"><div class="label">性別</div><div class="value">${s.gender === 'female' ? '女性' : '男性'}</div></div>
              <div class="info-item"><div class="label">身高</div><div class="value">${s.height ? s.height + ' cm' : '-'}</div></div>
              <div class="info-item"><div class="label">體重</div><div class="value">${s.weight ? s.weight + ' kg' : '-'}</div></div>
              <div class="info-item"><div class="label">年齡</div><div class="value">${s.age || '-'}</div></div>
              <div class="info-item"><div class="label">聯絡方式</div><div class="value">${s.contact || '-'}</div></div>
              <div class="info-item"><div class="label">開始日期</div><div class="value">${s.startDate || '-'}</div></div>
            </div>
          </div>
          <div class="detail-section">
            <div class="detail-section-title">課程資訊</div>
            <div class="session-highlight">
              <div><div class="session-number">${remaining}</div><div class="session-label">剩餘堂數</div></div>
              <div class="session-sub">已上 <strong>${s.usedSessions || 0}</strong> 堂 / 共 <strong>${s.totalSessions || 0}</strong> 堂</div>
            </div>
          </div>`;
        loadRecords(id);
      } catch (err) { console.error(err); }
    }

    // ===== Student Modal =====
    function showAddStudent() {
      editingStudentId = null;
      document.getElementById('studentModalTitle').textContent = '新增學員';
      ['sName','sHeight','sWeight','sAge','sContact','sStartDate'].forEach(id => document.getElementById(id).value = '');
      document.getElementById('sGender').value = 'male';
      openModal('studentModal');
    }
    async function showEditStudent() {
      if (!currentStudentId) return;
      editingStudentId = currentStudentId;
      const doc = await db.collection('students').doc(currentStudentId).get();
      const s = doc.data();
      document.getElementById('studentModalTitle').textContent = '編輯學員';
      document.getElementById('sName').value = s.name || '';
      document.getElementById('sGender').value = s.gender || 'male';
      document.getElementById('sHeight').value = s.height || '';
      document.getElementById('sWeight').value = s.weight || '';
      document.getElementById('sAge').value = s.age || '';
      document.getElementById('sContact').value = s.contact || '';
      document.getElementById('sStartDate').value = s.startDate || '';
      openModal('studentModal');
    }
    async function saveStudent() {
      const name = document.getElementById('sName').value.trim();
      if (!name) { alert('請輸入姓名'); return; }
      const data = {
        name, gender: document.getElementById('sGender').value,
        height: parseFloat(document.getElementById('sHeight').value) || null,
        weight: parseFloat(document.getElementById('sWeight').value) || null,
        age: parseInt(document.getElementById('sAge').value) || null,
        contact: document.getElementById('sContact').value.trim() || null,
        startDate: document.getElementById('sStartDate').value || null,
      };
      try {
        if (editingStudentId) {
          await db.collection('students').doc(editingStudentId).update(data);
          closeModal('studentModal'); showToast('學員資料已更新'); loadStudentDetail(editingStudentId);
        } else {
          data.usedSessions = 0; data.totalSessions = 0;
          data.createdAt = firebase.firestore.FieldValue.serverTimestamp();
          const docRef = await db.collection('students').add(data);
          closeModal('studentModal'); showToast('學員已新增'); await loadStudentsCache(); showDetail(docRef.id);
        }
      } catch (err) { alert('儲存失敗：' + err.message); }
    }
    async function deleteStudent() {
      if (!currentStudentId || !confirm('確定要刪除這位學員嗎？此操作無法復原。')) return;
      try {
        // Delete related bookings
        const bookings = await db.collection('bookings').where('studentId', '==', currentStudentId).get();
        const batch = db.batch();
        bookings.forEach(doc => batch.delete(doc.ref));
        // Delete related purchases
        const purchases = await db.collection('purchases').where('studentId', '==', currentStudentId).get();
        purchases.forEach(doc => batch.delete(doc.ref));
        batch.delete(db.collection('students').doc(currentStudentId));
        await batch.commit();
        await loadStudentsCache(); showList();
      } catch (err) { alert('刪除失敗：' + err.message); }
    }

    // ===== Records (unified with bookings) =====
    async function loadRecords(studentId) {
      const container = document.getElementById('recordsList');
      container.innerHTML = '<div class="empty-state">載入中...</div>';
      try {
        const snapshot = await db.collection('bookings')
          .where('studentId', '==', studentId).get();

        // Filter confirmed and sort client-side (avoids composite index)
        const confirmed = [];
        snapshot.forEach(doc => {
          const d = doc.data();
          if (d.status === 'confirmed') confirmed.push({ id: doc.id, ...d });
        });
        confirmed.sort((a, b) => (b.dateTime || '').localeCompare(a.dateTime || ''));

        if (confirmed.length === 0) { container.innerHTML = '<div class="empty-state">尚無上課紀錄</div>'; renderWeightChart([]); renderExerciseReference([]); return; }

        const weightData = [];
        const allBookings = [];
        container.innerHTML = '';
        confirmed.forEach(entry => {
          const r = entry;
          const doc = { id: entry.id };
          allBookings.push(r);
          const dt = new Date(r.dateTime);
          const dateStr = dt.toLocaleDateString('zh-TW', { year: 'numeric', month: 'long', day: 'numeric' });
          const timeStr = dt.toLocaleTimeString('zh-TW', { hour: '2-digit', minute: '2-digit' });
          if (r.weight) weightData.push({ date: r.dateTime.split('T')[0], weight: r.weight });

          let statsHtml = '';
          if (r.weight) statsHtml += `<span>體重：${r.weight} kg</span>`;
          if (r.bodyFat) statsHtml += `<span>體脂：${r.bodyFat}%</span>`;

          let exercisesHtml = '';
          if (r.exercises && r.exercises.length > 0) {
            exercisesHtml = '<div class="record-exercises">' +
              r.exercises.map(e => `<div class="re-item">${e.name} <span class="re-weight">${e.weight}</span>${e.sets ? `<span class="re-sets">${e.sets}</span>` : ''}</div>`).join('') +
              '</div>';
          }

          const isWeightLog = r.type === 'weight_log';
          const typeLabel = isWeightLog ? ' <span style="font-size:0.75rem;color:var(--text-muted)">(體重紀錄)</span>' : '';

          const card = document.createElement('div');
          card.className = 'record-card';
          card.innerHTML = `<div class="record-date">${dateStr}${isWeightLog ? '' : ' ' + timeStr}${typeLabel}</div>
            ${statsHtml ? `<div class="record-stats">${statsHtml}</div>` : ''}
            ${r.notes ? `<div class="record-notes">${r.notes}</div>` : ''}
            ${exercisesHtml}
            <button class="btn btn-outline btn-sm" style="margin-top:0.75rem" onclick="deleteRecord('${doc.id}', ${isWeightLog})">刪除</button>`;
          container.appendChild(card);
        });

        renderWeightChart(weightData.reverse());
        renderExerciseReference(allBookings);
      } catch (err) { container.innerHTML = '<div class="empty-state">載入失敗</div>'; console.error(err); }
    }

    function showAddRecord() {
      document.getElementById('rDate').value = todayStr();
      document.getElementById('rTime').value = '10:00';
      ['rWeight','rBodyFat','rNotes'].forEach(id => document.getElementById(id).value = '');
      document.getElementById('rExercises').innerHTML = '';
      renderExercisePicker('rExercisePicker', 'rExercises');
      openModal('recordModal');
    }

    async function saveRecord() {
      if (saving) return; saving = true;
      const date = document.getElementById('rDate').value;
      const time = document.getElementById('rTime').value || '10:00';
      if (!date || !currentStudentId) { alert('請選擇日期'); return; }

      const student = studentsCache.find(s => s.id === currentStudentId);
      const dateTime = new Date(`${date}T${time}`).toISOString();

      try {
        await db.collection('bookings').add({
          studentId: currentStudentId,
          studentName: student ? student.name : '',
          dateTime,
          status: 'confirmed',
          weight: parseFloat(document.getElementById('rWeight').value) || null,
          bodyFat: parseFloat(document.getElementById('rBodyFat').value) || null,
          notes: document.getElementById('rNotes').value.trim() || null,
          exercises: getExercisesFromContainer('rExercises'),
          createdAt: firebase.firestore.FieldValue.serverTimestamp(),
        });
        await db.collection('students').doc(currentStudentId).update({ usedSessions: firebase.firestore.FieldValue.increment(1) });
        closeModal('recordModal'); showToast('上課紀錄已新增'); loadExerciseHistory(); loadStudentDetail(currentStudentId);
      } catch (err) { alert('儲存失敗：' + err.message); } finally { saving = false; }
    }

    async function deleteRecord(bookingId, isWeightLog) {
      if (!currentStudentId || !confirm('確定要刪除這筆紀錄嗎？')) return;
      try {
        await db.collection('bookings').doc(bookingId).delete();
        if (!isWeightLog) {
          await db.collection('students').doc(currentStudentId).update({ usedSessions: firebase.firestore.FieldValue.increment(-1) });
        }
        loadStudentDetail(currentStudentId);
      } catch (err) { alert('刪除失敗：' + err.message); }
    }

    // ===== Exercises =====
    let exerciseHistory = []; // all exercise names used before, for suggestions

    async function loadExerciseHistory() {
      try {
        const snap = await db.collection('bookings').where('status', '==', 'confirmed').get();
        const names = new Set();
        snap.forEach(doc => {
          const d = doc.data();
          if (d.exercises) d.exercises.forEach(e => { if (e.name) names.add(e.name); });
        });
        exerciseHistory = [...names].sort();
      } catch (err) { console.error(err); }
    }

    function addExerciseRow(containerId, name, weight, sets) {
      const container = document.getElementById(containerId);
      const row = document.createElement('div');
      row.className = 'exercise-row';
      row.style.position = 'relative';
      row.innerHTML = `
        <input class="ex-name" placeholder="動作名稱" value="${name || ''}" oninput="showExSuggest(this)" onfocus="showExSuggest(this)" onblur="setTimeout(()=>hideExSuggest(this),200)">
        <input class="ex-weight" placeholder="重量" value="${weight || ''}">
        <input class="ex-sets" placeholder="組×次" value="${sets || ''}">
        <button type="button" class="ex-remove" onclick="this.parentElement.remove()">✕</button>
        <div class="exercise-suggest" style="display:none; top:100%; left:0;"></div>`;
      container.appendChild(row);
      row.querySelector('.ex-name').focus();
    }

    function showExSuggest(input) {
      const val = input.value.trim().toLowerCase();
      const suggestDiv = input.parentElement.querySelector('.exercise-suggest');
      const matches = exerciseHistory.filter(n => n.toLowerCase().includes(val));
      if (matches.length === 0 || (matches.length === 1 && matches[0] === input.value)) {
        suggestDiv.style.display = 'none'; return;
      }
      suggestDiv.innerHTML = '';
      matches.slice(0, 8).forEach(name => {
        const item = document.createElement('div');
        item.className = 'exercise-suggest-item';
        item.textContent = name;
        item.onmousedown = () => { input.value = name; suggestDiv.style.display = 'none'; };
        suggestDiv.appendChild(item);
      });
      suggestDiv.style.display = 'block';
    }

    function hideExSuggest(input) {
      const suggestDiv = input.parentElement.querySelector('.exercise-suggest');
      if (suggestDiv) suggestDiv.style.display = 'none';
    }

    // ===== Weight Chart =====
    function renderWeightChart(data) {
      const section = document.getElementById('weightChartSection');
      const label = document.getElementById('weightChangeLabel');

      if (data.length < 1) { section.style.display = 'none'; return; }
      section.style.display = 'block';

      if (data.length === 1) {
        label.className = 'weight-change';
        label.textContent = `目前 ${data[0].weight} kg`;
      } else {
        const first = data[0].weight;
        const last = data[data.length - 1].weight;
        const changePct = ((last - first) / first * 100).toFixed(1);
        if (last <= first) {
          label.className = 'weight-change down';
          label.textContent = `${changePct}%（${first} → ${last} kg）`;
        } else {
          label.className = 'weight-change up';
          label.textContent = `+${changePct}%（${first} → ${last} kg）`;
        }
      }

      const canvas = document.getElementById('weightChart');
      const ctx = canvas.getContext('2d');
      const dpr = window.devicePixelRatio || 1;
      const rect = canvas.getBoundingClientRect();
      canvas.width = rect.width * dpr;
      canvas.height = rect.height * dpr;
      ctx.scale(dpr, dpr);
      const W = rect.width;
      const H = rect.height;
      ctx.clearRect(0, 0, W, H);

      const weights = data.map(d => d.weight);
      const minW = Math.min(...weights) - 1;
      const maxW = Math.max(...weights) + 1;
      const padX = 50, padY = 30;
      const chartW = W - padX * 2;
      const chartH = H - padY * 2;

      const points = data.map((d, i) => ({
        x: padX + (data.length === 1 ? chartW / 2 : (i / (data.length - 1)) * chartW),
        y: padY + chartH - ((d.weight - minW) / (maxW - minW)) * chartH,
      }));

      // Grid lines
      ctx.strokeStyle = 'rgba(255,255,255,0.06)';
      ctx.lineWidth = 1;
      for (let i = 0; i <= 4; i++) {
        const y = padY + (i / 4) * chartH;
        ctx.beginPath(); ctx.moveTo(padX, y); ctx.lineTo(W - padX, y); ctx.stroke();
        const val = (maxW - (i / 4) * (maxW - minW)).toFixed(1);
        ctx.fillStyle = 'rgba(255,255,255,0.3)';
        ctx.font = '11px sans-serif';
        ctx.textAlign = 'right';
        ctx.fillText(val, padX - 8, y + 4);
      }

      // Line gradient
      const grad = ctx.createLinearGradient(0, padY, 0, H - padY);
      grad.addColorStop(0, '#f5a623');
      grad.addColorStop(1, '#2ecc71');

      // Area fill
      ctx.beginPath();
      ctx.moveTo(points[0].x, H - padY);
      points.forEach(p => ctx.lineTo(p.x, p.y));
      ctx.lineTo(points[points.length - 1].x, H - padY);
      ctx.closePath();
      const areaGrad = ctx.createLinearGradient(0, padY, 0, H - padY);
      areaGrad.addColorStop(0, 'rgba(245,166,35,0.15)');
      areaGrad.addColorStop(1, 'rgba(46,204,113,0.02)');
      ctx.fillStyle = areaGrad;
      ctx.fill();

      // Line
      ctx.beginPath();
      points.forEach((p, i) => { if (i === 0) ctx.moveTo(p.x, p.y); else ctx.lineTo(p.x, p.y); });
      ctx.strokeStyle = grad;
      ctx.lineWidth = 2.5;
      ctx.lineJoin = 'round';
      ctx.stroke();

      // Dots + labels
      points.forEach((p, i) => {
        ctx.beginPath(); ctx.arc(p.x, p.y, 4, 0, Math.PI * 2);
        ctx.fillStyle = '#f5a623'; ctx.fill();
        ctx.fillStyle = 'rgba(255,255,255,0.6)';
        ctx.font = '10px sans-serif'; ctx.textAlign = 'center';
        ctx.fillText(data[i].date.slice(5), p.x, H - padY + 16);
      });
    }

    // ===== Schedule =====
    async function loadSchedule() {
      const nowStr = new Date().toISOString();
      try {
        const snap = await db.collection('bookings').orderBy('dateTime', 'asc').get();
        const todos = [], upcoming = [], past = [];

        snap.forEach(doc => {
          const b = { id: doc.id, ...doc.data() };
          if (b.status === 'upcoming' && b.dateTime <= nowStr) {
            db.collection('bookings').doc(doc.id).update({ status: 'pending' });
            b.status = 'pending';
          }
          if (b.status === 'pending') todos.push(b);
          else if (b.status === 'upcoming') upcoming.push(b);
          else past.push(b);
        });

        // Todos
        const todoC = document.getElementById('todoList');
        if (!todos.length) { todoC.innerHTML = '<div class="empty-state">沒有待確認的課程</div>'; }
        else {
          todoC.innerHTML = '';
          todos.forEach(b => {
            const dt = new Date(b.dateTime);
            const dateStr = dt.toLocaleDateString('zh-TW', { month: 'long', day: 'numeric' });
            const timeStr = dt.toLocaleTimeString('zh-TW', { hour: '2-digit', minute: '2-digit' });
            const div = document.createElement('div'); div.className = 'todo-card';
            div.innerHTML = `<div class="todo-info"><h3>${b.studentName}</h3><div class="todo-time">${dateStr} ${timeStr}</div></div>
              <div class="todo-actions">
                <button class="btn btn-success btn-sm" onclick="showTodoConfirm('${b.id}','${b.studentId}','${b.studentName}','${b.dateTime}')">確認完課</button>
                <button class="btn btn-outline btn-sm" onclick="cancelBooking('${b.id}')">取消</button>
              </div>`;
            todoC.appendChild(div);
          });
        }

        // Upcoming
        const upC = document.getElementById('upcomingBookings');
        if (!upcoming.length) { upC.innerHTML = '<div class="empty-state">沒有近期預約</div>'; }
        else {
          upC.innerHTML = '';
          upcoming.forEach(b => {
            const dt = new Date(b.dateTime);
            const dateStr = dt.toLocaleDateString('zh-TW', { year: 'numeric', month: 'long', day: 'numeric' });
            const timeStr = dt.toLocaleTimeString('zh-TW', { hour: '2-digit', minute: '2-digit' });
            const div = document.createElement('div'); div.className = 'booking-card';
            div.innerHTML = `<div class="booking-info"><strong>${b.studentName}</strong><div class="booking-time">${dateStr} ${timeStr}</div></div>
              <button class="btn btn-outline btn-sm" onclick="cancelBooking('${b.id}')">取消預約</button>`;
            upC.appendChild(div);
          });
        }

        // Past
        const pastC = document.getElementById('pastBookings');
        const recentPast = past.reverse().slice(0, 30);
        if (!recentPast.length) { pastC.innerHTML = '<div class="empty-state">沒有歷史紀錄</div>'; }
        else {
          pastC.innerHTML = '';
          recentPast.forEach((b, idx) => {
            const dt = new Date(b.dateTime);
            const dateStr = dt.toLocaleDateString('zh-TW', { month: 'short', day: 'numeric' });
            const timeStr = dt.toLocaleTimeString('zh-TW', { hour: '2-digit', minute: '2-digit' });
            const hasDetails = (b.exercises && b.exercises.length) || b.weight || b.bodyFat || b.notes;
            const detailId = 'pastDetail_' + idx;

            let detailHtml = '';
            if (hasDetails) {
              let inner = '';
              if (b.weight) inner += `<span style="color:var(--text-muted);font-size:0.85rem">體重：${b.weight} kg</span> `;
              if (b.bodyFat) inner += `<span style="color:var(--text-muted);font-size:0.85rem">體脂：${b.bodyFat}%</span> `;
              if (b.notes) inner += `<div style="color:var(--text);font-size:0.85rem;margin-top:0.3rem">${b.notes}</div>`;
              if (b.exercises && b.exercises.length) {
                inner += '<div class="record-exercises" style="margin-top:0.4rem">' +
                  b.exercises.map(e => `<div class="re-item">${e.name} <span class="re-weight">${e.weight}</span>${e.sets ? `<span class="re-sets">${e.sets}</span>` : ''}</div>`).join('') +
                  '</div>';
              }
              detailHtml = `<div id="${detailId}" style="display:none;padding:0.75rem 0 0;border-top:1px solid var(--border);margin-top:0.75rem">${inner}</div>`;
            }

            const div = document.createElement('div'); div.className = 'booking-card'; div.style.flexWrap = 'wrap';
            div.innerHTML = `
              <div class="booking-info" style="flex:1;cursor:${hasDetails ? 'pointer' : 'default'}" ${hasDetails ? `onclick="document.getElementById('${detailId}').style.display = document.getElementById('${detailId}').style.display === 'none' ? 'block' : 'none'"` : ''}>
                <strong>${b.studentName}</strong>
                <div class="booking-time">${dateStr} ${timeStr} ${hasDetails ? '<span style="color:var(--gold);font-size:0.75rem">▼ 詳細</span>' : ''}</div>
              </div>
              <span class="booking-status ${b.status}">${b.status === 'confirmed' ? '已完課' : '已取消'}</span>
              ${hasDetails ? `<div style="width:100%">${detailHtml}</div>` : ''}`;
            pastC.appendChild(div);
          });
        }
      } catch (err) { console.error(err); }
    }

    // ===== Finance =====
    async function loadFinance() {
      try {
        const purchaseSnap = await db.collection('purchases').orderBy('date', 'desc').get();
        const purchases = [];
        purchaseSnap.forEach(doc => purchases.push({ id: doc.id, ...doc.data() }));

        const studentSnap = await db.collection('students').get();
        const students = {};
        studentSnap.forEach(doc => { students[doc.id] = doc.data(); });

        const now = new Date();
        const thisMonth = `${now.getFullYear()}-${String(now.getMonth() + 1).padStart(2, '0')}`;
        let totalReceived = 0, monthlyReceived = 0;
        const studentPurchases = {};

        purchases.forEach(p => {
          totalReceived += p.totalAmount || 0;
          if (p.date && p.date.startsWith(thisMonth)) monthlyReceived += p.totalAmount || 0;
          if (!studentPurchases[p.studentId]) studentPurchases[p.studentId] = { totalAmount: 0, totalSessions: 0 };
          studentPurchases[p.studentId].totalAmount += p.totalAmount || 0;
          studentPurchases[p.studentId].totalSessions += p.sessions || 0;
        });

        let totalEarned = 0;
        Object.keys(studentPurchases).forEach(sid => {
          const sp = studentPurchases[sid];
          const student = students[sid];
          if (student && sp.totalSessions > 0) {
            const avgPrice = sp.totalAmount / sp.totalSessions;
            totalEarned += Math.min(student.usedSessions || 0, sp.totalSessions) * avgPrice;
          }
        });

        document.getElementById('financeCards').innerHTML = `
          <div class="finance-card"><div class="fc-label">總收款</div><div class="fc-value gold">${formatMoney(totalReceived)}</div></div>
          <div class="finance-card"><div class="fc-label">已賺取（已完課）</div><div class="fc-value green">${formatMoney(Math.round(totalEarned))}</div></div>
          <div class="finance-card"><div class="fc-label">待完成</div><div class="fc-value">${formatMoney(Math.round(totalReceived - totalEarned))}</div><div class="fc-sub">尚未上完的課程金額</div></div>
          <div class="finance-card"><div class="fc-label">本月收款</div><div class="fc-value gold">${formatMoney(monthlyReceived)}</div></div>`;

        const listC = document.getElementById('purchaseList');
        if (!purchases.length) { listC.innerHTML = '<div class="empty-state">尚無購課紀錄</div>'; }
        else {
          listC.innerHTML = '';
          purchases.forEach(p => {
            const pps = p.sessions ? Math.round(p.totalAmount / p.sessions) : 0;
            const div = document.createElement('div'); div.className = 'purchase-card';
            div.innerHTML = `<div class="purchase-info"><div class="purchase-student">${p.studentName}</div>
              <div class="purchase-detail">${p.date || '-'} · ${p.sessions} 堂 · 每堂 ${formatMoney(pps)}</div></div>
              <div class="purchase-amount">${formatMoney(p.totalAmount)}</div>`;
            listC.appendChild(div);
          });
        }
      } catch (err) { console.error(err); }
    }

      document.getElementById('pDate').value = todayStr();
      document.getElementById('pSessions').value = '';
      document.getElementById('pAmount').value = '';
      openModal('purchaseModal');
    }
    async function savePurchase() {
      if (saving) return; saving = true;
      const studentId = document.getElementById('pStudent').value;
      const date = document.getElementById('pDate').value;
      const sessions = parseInt(document.getElementById('pSessions').value);
      const totalAmount = parseInt(document.getElementById('pAmount').value);
      if (!studentId || !sessions || !totalAmount) { saving = false; alert('請填寫完整資料'); return; }
      const student = studentsCache.find(s => s.id === studentId);
      try {
        await db.collection('purchases').add({
          studentId, studentName: student.name,
          date: date || todayStr(), sessions, totalAmount,
          createdAt: firebase.firestore.FieldValue.serverTimestamp(),
        });
        await db.collection('students').doc(studentId).update({ totalSessions: firebase.firestore.FieldValue.increment(sessions) });
        closeModal('purchaseModal'); showToast('購課紀錄已新增'); await loadStudentsCache(); loadFinance();
        if (currentStudentId) loadStudentDetail(currentStudentId);
      } catch (err) { alert('儲存失敗：' + err.message); } finally { saving = false; }
    }
  </script>
</body>
</html>
